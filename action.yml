name: Report new linter errors
description: |
  This action reports new linter errors in a commit.
  Requires permissions `contents: write` to save the snapshot of linter errors.
inputs:
  command:
    description: The command to run the linter and output errors in a specific format.
    required: true
  snapshot_storage:
    required: true
    description: The method to save the snapshot of linter errors. Can be "cache" or "commit".
  cache_key_prefix:
    required: false
    default: "report-new-linter-errors-snapshot"
    description: The prefix for the cache name when using "cache" snapshot storage. Default is "report-new-linter-errors-snapshot".
runs:
  using: composite
  steps:
  - id: install
    shell: bash
    run: |
      curl -L -o report-new-linter-errors https://github.com/igrep/report-new-linter-errors/releases/download/v0.0.5/report-new-linter-errors
      chmod +x report-new-linter-errors
      SHA256="5b2578ef5299a3ffaaa74eb1d5b7d87d9628e24f01e165e6f4fa9cf639b77d7e"
      echo "$SHA256  report-new-linter-errors" | sha256sum -c -
  - id: restore-cache
    if: ${{ inputs.snapshot_storage == 'cache' }}
    uses: actions/cache/restore@v5
    with:
      key: ${{ inputs.cache_key_prefix }}-${{ github.ref }}
      path: .report-new-linter-errors/
      restore-keys: ${{ inputs.cache_key_prefix }}-
  - id: run
    shell: bash
    env:
      USERNAME: github-actions[bot]
      EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
    run: |
      git config --global user.name "$USERNAME"
      git config --global user.email "$EMAIL"
      if [ -f .report-new-linter-errors/default/commit ]; then
        git fetch origin "$(cat .report-new-linter-errors/default/commit)" || true
      fi
      set +e # Keep going even if the command fails, so we can commit the new snapshot
      # Run checks against an existing snapshot.
      ./report-new-linter-errors run default
      exit_code=$?

      # Always refresh snapshot content and anchor commit for next runs.
      ./report-new-linter-errors snapshot default ${{ inputs.command }} -- .
      if [ "${{ inputs.snapshot_storage }}" = "commit" ]; then
        git add .report-new-linter-errors/
        git commit -m "Update report-new-linter-errors snapshot"
        git push
      elif [ "${{ inputs.snapshot_storage }}" = "cache" ]; then
        echo "Saving snapshot as cache"
      else
        echo "Invalid snapshot_storage value: ${{ inputs.snapshot_storage }}"
        # command line usage error. Ref. https://stackoverflow.com/questions/1101957/are-there-any-standard-exit-status-codes-in-linux
        exit 64
      fi
      exit $exit_code
  - id: save-cache
    if: ${{ inputs.snapshot_storage == 'cache' }}
    uses: actions/cache/save@v5
    with:
      key: ${{ inputs.cache_key_prefix }}-${{ github.ref }}
      path: .report-new-linter-errors/
